model_list:
  # 1. GLM 5.2
  - model_name: glm
    litellm_params:
      # THE FIX: 'openai/' prefix bypasses internal LiteLLM validations
      model: openai/z-ai/glm-5.2
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_NIM_API_KEY
      max_tokens: 4096
      additional_drop_params: ["logprobs", "top_logprobs", "presence_penalty", "frequency_penalty"]
      
  # 2. DeepSeek Flash
  - model_name: deepseek
    litellm_params:
      model: openai/deepseek-ai/deepseek-v4-flash
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_NIM_API_KEY
      max_tokens: 16384
      
  # 3. MiniMax M3
  - model_name: minimax
    litellm_params:
      model: openai/minimaxai/minimax-m3
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_NIM_API_KEY
      max_tokens: 16384
      # Added sanitizer for MiniMax just to be safe
      additional_drop_params: ["logprobs", "top_logprobs", "presence_penalty", "frequency_penalty"]

  # 4. StepFun Flash
  - model_name: stepfun
    litellm_params:
      model: openai/stepfun-ai/step-3.7-flash
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_NIM_API_KEY
      max_tokens: 16384

litellm_settings:
  drop_params: true
